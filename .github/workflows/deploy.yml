name: Deploy to Devnet

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-rust@v4
        with:
          rust-version: "1.75.0"

      - uses: solana-protocol/anchor@master
        with:
          anchor-version: 0.30.1
          solana-version: "1.18.26"

      - run: anchor build

      - run: |
          anchor deploy --provider.cluster devnet --keypair ${{ secrets.DEVNET_KEYPAIR }}
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com
