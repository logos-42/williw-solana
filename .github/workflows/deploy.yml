name: Deploy to Devnet

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable

      - name: Install AVM and Anchor CLI 1.0.0
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 1.0.0
          avm use 1.0.0
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Build
        run: anchor build --provider.cluster devnet

      - name: Setup keypair
        run: |
          echo '${{ secrets.DEVNET_KEYPAIR }}' > keypair.json

      - name: Deploy
        run: anchor deploy --provider.cluster devnet --keypair keypair.json
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com
