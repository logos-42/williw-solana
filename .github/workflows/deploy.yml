name: Deploy to Devnet

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL "https://release.anza.xyz/stable/install")"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install AVM and Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.30.1
          avm use 0.30.1
          echo "$HOME/.avm/versions/0.30.1/bin" >> $GITHUB_PATH

      - name: Build with cloud
        run: anchor build --provider.cluster devnet

      - name: Setup keypair
        run: |
          echo '${{ secrets.DEVNET_KEYPAIR }}' > keypair.json

      - name: Deploy
        run: anchor deploy --provider.cluster devnet --keypair keypair.json
        env:
          ANCHOR_PROVIDER_URL: https://api.devnet.solana.com
